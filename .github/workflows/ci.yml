name: CI

on:
  push:
    branches: [main, 'feature/**']
  pull_request:
    branches: [main]

jobs:
  lint:
    name: ShellCheck Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck

      - name: Lint shell scripts
        run: |
          find mergen/files/usr/lib/mergen -name '*.sh' -print0 | \
            xargs -0 shellcheck -s sh -e SC2034,SC2086,SC2155,SC1090,SC1091,SC2039,SC3043,SC3037,SC2317,SC2012,SC2071,SC3012
          shellcheck -s sh -e SC2034,SC2086,SC2155,SC1090,SC1091,SC2039,SC3043,SC3037,SC2317,SC2012,SC2071,SC3012 \
            mergen/files/usr/bin/mergen \
            mergen/files/usr/sbin/mergen-watchdog

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables ipset

      - name: Run unit tests
        run: |
          cd mergen/tests
          for f in test_core.sh test_utils.sh test_cache.sh test_engine.sh \
                   test_nftables.sh test_ipset.sh test_resolver.sh test_route.sh \
                   test_tags.sh test_conflicts.sh test_aggregation.sh test_rollback.sh \
                   test_import_export.sh test_logging.sh test_safe_mode.sh test_migrate.sh \
                   test_watchdog.sh test_ipv6.sh test_hotplug.sh test_cli.sh \
                   test_provider_fallback.sh test_provider_phase3.sh \
                   test_ripe_provider.sh test_bgpview_provider.sh test_bgptools_provider.sh \
                   test_irr_provider.sh test_maxmind_provider.sh test_routeviews_provider.sh; do
            echo "--- $f ---"
            sh "$f" 2>&1 || exit 1
          done

      - name: Run performance tests
        run: |
          cd mergen/tests
          sh test_performance.sh 2>&1

      - name: Run platform tests
        run: |
          cd mergen/tests
          sh test_platform.sh 2>&1

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Install test dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y nftables ipset

      - name: Run integration tests
        run: |
          cd mergen/tests
          for f in test_integration_nftables.sh test_integration_rollback.sh \
                   test_integration_logging.sh; do
            echo "--- $f ---"
            sh "$f" 2>&1 || exit 1
          done

  build:
    name: Package Build Check
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    steps:
      - uses: actions/checkout@v4

      - name: Verify package structure
        run: |
          echo "=== Checking Makefile ==="
          test -f mergen/Makefile && echo "OK: Makefile exists"
          grep -q 'PKG_NAME' mergen/Makefile && echo "OK: PKG_NAME defined"
          grep -q 'PKG_VERSION' mergen/Makefile && echo "OK: PKG_VERSION defined"

          echo ""
          echo "=== Checking file structure ==="
          test -d mergen/files/usr/lib/mergen && echo "OK: lib directory"
          test -f mergen/files/usr/bin/mergen && echo "OK: CLI binary"
          test -f mergen/files/usr/sbin/mergen-watchdog && echo "OK: watchdog"
          test -f mergen/files/etc/config/mergen && echo "OK: UCI config"
          test -f mergen/files/etc/init.d/mergen && echo "OK: init script"

          echo ""
          echo "=== Checking LuCI package ==="
          test -f luci-app-mergen/Makefile && echo "OK: LuCI Makefile"
          test -f luci-app-mergen/luasrc/controller/mergen.lua && echo "OK: LuCI controller"

      - name: Check package size
        run: |
          # Calculate approximate package size (all files combined)
          total_size=$(find mergen/files -type f -exec wc -c {} + | tail -1 | awk '{print $1}')
          echo "Total mergen package files: ${total_size} bytes"

          luci_size=$(find luci-app-mergen -type f -exec wc -c {} + | tail -1 | awk '{print $1}')
          echo "Total luci-app-mergen files: ${luci_size} bytes"

          combined=$((total_size + luci_size))
          echo "Combined size: ${combined} bytes"

          # Verify under 500KB uncompressed (will be much smaller as .ipk)
          if [ "$combined" -lt 512000 ]; then
            echo "OK: Package size within limits"
          else
            echo "WARNING: Package size ${combined} bytes exceeds 500KB"
          fi

  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [lint, unit-test, integration-test, build]
    if: always()
    steps:
      - name: Report
        run: |
          echo "=== CI Pipeline Complete ==="
          echo "Lint:        ${{ needs.lint.result }}"
          echo "Unit Tests:  ${{ needs.unit-test.result }}"
          echo "Integration: ${{ needs.integration-test.result }}"
          echo "Build:       ${{ needs.build.result }}"
