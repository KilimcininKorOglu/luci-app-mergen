name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Verify version consistency
        run: |
          TAG_VERSION="${{ steps.version.outputs.VERSION }}"
          CLI_VERSION=$(grep 'MERGEN_VERSION=' mergen/files/usr/bin/mergen | head -1 | cut -d'"' -f2)
          echo "Tag version: ${TAG_VERSION}"
          echo "CLI version: ${CLI_VERSION}"
          if [ "$TAG_VERSION" != "$CLI_VERSION" ]; then
            echo "WARNING: Tag version does not match CLI version"
          fi

      - name: Run tests
        run: |
          cd mergen/tests
          sh test_platform.sh 2>&1
          sh test_performance.sh 2>&1

      - name: Build IPK packages
        run: chmod +x build.sh && ./build.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.ipk
          generate_release_notes: true
          draft: false
          prerelease: false
